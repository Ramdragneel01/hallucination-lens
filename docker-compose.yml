
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    environment:
      - MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - FAITHFULNESS_THRESHOLD=0.6
      - MIN_THRESHOLD=0.3
      - MAX_THRESHOLD=0.9
      - MAX_BATCH_ITEMS=50
      - MAX_REQUEST_BYTES=1048576
      - RATE_LIMIT_PER_MINUTE=120
      - PRELOAD_MODEL_ON_STARTUP=true
      - HOST=0.0.0.0
      - PORT=8003
      - WEB_CONCURRENCY=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - SECURE_HEADERS_ENABLED=true
      - CORS_ORIGINS=http://127.0.0.1:4176,http://localhost:4176
    ports:
      - "8003:8003"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3); sys.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9093:9090"
    depends_on:
      api:
        condition: service_healthy
